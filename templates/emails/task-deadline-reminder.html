Subject: {{eventDisplayName}} task {{state}}: {{taskTitle}}
<h2 style="margin:0 0 16px;font-size:20px;color:#1a1a2e;">Hi {{firstName}},</h2>
<p style="margin:0 0 16px;">Your task is <strong>{{state}}</strong>:</p>
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin:0 0 20px;">
  <tr><td style="background-color:#f8f9fb;border-left:3px solid {{brandColor}};padding:14px 16px;border-radius:4px;">
    <strong style="font-size:16px;">{{taskTitle}}</strong><br>
    <span style="color:#6b7280;">Due: {{dueDate}}</span>
  </td></tr>
</table>
<p style="margin:0 0 24px;">{{taskLink}}</p>
<table role="presentation" cellpadding="0" cellspacing="0"><tr>
  <td style="background-color:{{brandColor}};border-radius:6px;">
    <a href="{{hubUrl}}" style="display:inline-block;padding:12px 28px;color:#ffffff;font-size:15px;font-weight:bold;text-decoration:none;">Open the hub</a>
  </td>
</tr></table>
<p style="margin:6px 0 16px;color:#6b7280;font-size:13px;text-align:center;">(Log in with your email, if prompted)</p>
